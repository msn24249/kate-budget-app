services:
  - type: web
    name: line-bookkeeping-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: LINE_PUSH_USER_ID
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TIMEZONE
        value: Asia/Taipei
